    async function loadLeaderboards() {
        try {
            const response = await fetch('http://192.168.1.64:5000/api/users/all');
            const data = await response.json();
            
            // Функция для заполнения таблицы
            function fillTable(tableId, sortField, fieldName) {
                const tableBody = document.querySelector(`${tableId} tbody`);
                tableBody.innerHTML = '';
                
                // Сортируем данные по нужному полю
                const sortedData = [...data].sort((a, b) => b[sortField] - a[sortField]);
                
                // Заполняем таблицу
                sortedData.slice(0, 6).forEach((player, index) => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${index + 1}</td>
                        <td>${player.first_name}</td>
                        <td>${player[sortField]}</td>
                    `;
                    tableBody.appendChild(row);
                });
            }
            
            // Заполняем все таблицы
            fillTable('#gemsTable', 'gems', 'Гемы');
            fillTable('#xpTable', 'xp', 'XP');
            fillTable('#clicksTable', 'click_count', 'Клики');
            fillTable('#starsTable', 'stars', 'Звёзды');
            fillTable('#spinsTable', 'spin_count', 'Спины');
            
        } catch (error) {
            console.error('Ошибка:', error);
        }
    }

async function loadStats1() {
    const competitionPlayers = ['ULQY2U8U', '80RCCGQL'];
    const TARGET = 200000;
    let playersData = [];

    // Получаем данные игроков
    for (let tag of competitionPlayers) {
        try {
            const response = await fetch(`http://192.168.1.64:5000/api/player/${tag}`);
            const data = await response.json();
            playersData.push({
                name: data.name,
                tag: tag,
                trophies: data.trophies,
                toTarget: TARGET - data.trophies
            });
        } catch (error) {
            console.error(`Ошибка загрузки данных для ${tag}:`, error);
        }
    }

    // Сортируем по трофеям (по убыванию)
    playersData.sort((a, b) => b.trophies - a.trophies);

    // Добавляем CSS стили для выделения
    const styles = `
        <style>
            #competitionTable {
                font-family: '2';
                color: white;
                background: black;
                padding: 15px;
            }
            .quotes {
                margin-bottom: 10px;
                padding: 5px;
                border-left: 3px solid #777;
            }
            .quotes b {
                color: gold;
            }
            .winner {
                color: gold;
                font-size: 1.2em;
            }
        </style>
    `;

    // Формируем HTML-строку с таблицей лидеров
    let htmlOutput = `
        ${styles}
        <div id="competitionTable">
            <b>🎯 СОРЕВНОВАНИЕ ЗА 200000 ТРОФЕЕВ 🎯</b><br><br>
            <b>🏆 ТАБЛИЦА ЛИДЕРОВ:</b><br><br>
    `;

    playersData.forEach((player, index) => {
        htmlOutput += `
            <div class="quotes">
                ${index + 1}. <b>${player.name} (${player.tag})</b>:<br>
                &nbsp;&nbsp;• Текущие трофеи: <b>${player.trophies}</b><br>
                &nbsp;&nbsp;• До цели: <b>${player.toTarget}</b><br><br>
            </div>
        `;
    });

    // Добавляем информацию о победителе
    const winner = playersData.find(player => player.trophies >= TARGET);
    if (winner) {
        htmlOutput += `<div class="winner"><br>🏆 ПОБЕДИТЕЛЬ: ${winner.name}!</div>`;
    } else {
        htmlOutput += `<br><b>🏆 Победитель пока не определен</b><br>`;
    }

    htmlOutput += '</div>';

    // Выводим в элемент DOM
    document.getElementById('competitionContainer').innerHTML = htmlOutput;
}

// Обработка сообщений от service worker
navigator.serviceWorker.addEventListener('message', (event) => {
    console.log('Получено сообщение от SW:', event.data);
    switch (event.data.type) {
        case 'show-input':
            console.log('Запрос на ввод текста');
            const inputText = prompt(event.data.message);
            if (inputText) {
                event.source.postMessage({
                    type: 'input-response',
                    text: inputText
                });
            }
            break;
            
        case 'input-confirmed':
            console.log('Подтверждение ввода');
            alert(event.data.message);
            break;
            
        case 'show-alert':
            console.log('Запрос на алерт');
            alert(event.data.message);
            break;
    }
});

// Функция для отправки уведомления
async function sendNotification(title, options = {}) {
    try {
        if (!window.Notification) {
            console.log('Ваш браузер не поддерживает уведомления');
            return;
        }

        if (Notification.permission !== 'granted') {
            const permission = await Notification.requestPermission();
            if (permission !== 'granted') {
                console.log('Уведомления запрещены');
                return;
            }
        }

        const registration = await navigator.serviceWorker.getRegistration();
        if (!registration) {
            console.error('Сервис-воркер не зарегистрирован');
            return;
        }

        await registration.showNotification(title, {
            body: options.body || '',
            icon: options.icon || '',
            actions: [
                { action: 'reply', title: 'Ответить' },
                { action: 'alert', title: 'Показать сообщение' },
                { action: 'view', title: 'Открыть' }
            ]
        });
    } catch (error) {
        console.error('Ошибка при отправке уведомления:', error);
    }
}

// Инициализация

    try {

// Функция запроса разрешения на уведомления
async function requestNotificationPermission() {
    try {
        const permission = await Notification.requestPermission();
        if (permission === 'granted') {
            console.log('Уведомления разрешены');
        } else {
            console.log('Уведомления запрещены');
        }
    } catch (error) {
        console.error('Ошибка запроса разрешения:', error);
    }
                }

const searchKeywords = ['alert', 'notification', 'message', 'tv'];

function searchMethods(obj, keywords) {
    Object.getOwnPropertyNames(obj).forEach(method => {
        if (keywords.some(keyword => method.includes(keyword))) {
            console.log(`Найден метод: ${method}`);
            try {
                console.log(`Описание:`, obj[method]);
            } catch (e) {
                console.warn(`Ошибка при получении описания для ${method}`);
            }
        }
    });
}

searchMethods(window, searchKeywords);
    </script>
